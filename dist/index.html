<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>eighty5labs | AI Operating System for Local Business</title>
    <meta name="description" content="AI agents that close the visibility, reputation, and conversion gaps for local service businesses. Get found in AI search. Dominate Google Maps. Never miss a call." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        /* Dark palette */
        --bg0: #080C17;
        --bg1: #0F1623;
        --bg2: #161E2E;
        --bg3: #1C2540;
        --surface: rgba(255,255,255,0.04);
        --surface-hover: rgba(255,255,255,0.07);

        /* Brand */
        --blue: #1B4FFF;
        --blue2: #2B5FFF;
        --blue3: #4F8EF7;
        --blue-lt: rgba(27,79,255,0.12);
        --blue-border: rgba(27,79,255,0.3);

        /* Gap colors */
        --gap1: #10B981;
        --gap1-lt: rgba(16,185,129,0.12);
        --gap1-border: rgba(16,185,129,0.25);
        --gap2: #4F8EF7;
        --gap2-lt: rgba(79,142,247,0.12);
        --gap2-border: rgba(79,142,247,0.22);
        --gap3: #A78BFA;
        --gap3-lt: rgba(167,139,250,0.12);
        --gap3-border: rgba(167,139,250,0.22);

        /* Text */
        --t1: #FFFFFF;
        --t2: rgba(255,255,255,0.80);
        --t3: rgba(255,255,255,0.55);
        --t4: rgba(255,255,255,0.35);

        /* Borders */
        --border: rgba(255,255,255,0.08);
        --border-strong: rgba(255,255,255,0.14);

        /* Radius */
        --rd: 10px;
        --rdl: 14px;
        --rdxl: 20px;

        /* Fonts */
        --fd: 'Epilogue', sans-serif;
        --fb: 'Inter', sans-serif;

        /* Layout */
        --max-w: 1140px;
        --nav-h: 68px;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html { scroll-behavior: smooth; }

      body {
        background: var(--bg0);
        color: var(--t1);
        font-family: var(--fb);
        font-size: 16px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      /* Grid noise overlay */
      #grid-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background-image:
          linear-gradient(to right, rgba(255,255,255,0.025) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255,255,255,0.025) 1px, transparent 1px);
        background-size: 72px 72px;
        mask-image: radial-gradient(ellipse at top, rgba(0,0,0,0.6) 0%, rgba(0,0,0,0) 75%);
      }

      #root { position: relative; z-index: 1; min-height: 100vh; }

      /* Container */
      .wrap {
        max-width: var(--max-w);
        margin-inline: auto;
        padding-inline: clamp(20px, 5vw, 48px);
        width: 100%;
      }

      /* Typography */
      h1, h2, h3, h4, h5 { font-family: var(--fd); letter-spacing: -0.03em; line-height: 1.08; }

      /* Buttons */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 12px 22px;
        border-radius: var(--rd);
        font-family: var(--fd);
        font-size: 0.9375rem;
        font-weight: 800;
        cursor: pointer;
        border: none;
        transition: all 0.18s ease;
        text-decoration: none;
        white-space: nowrap;
      }
      .btn-primary {
        background: var(--blue);
        color: #fff;
        box-shadow: 0 4px 20px rgba(27,79,255,0.35);
      }
      .btn-primary:hover {
        background: #1440e0;
        transform: translateY(-1px);
        box-shadow: 0 8px 32px rgba(27,79,255,0.45);
      }
      .btn-ghost {
        background: var(--surface);
        color: var(--t1);
        border: 1.5px solid var(--border);
      }
      .btn-ghost:hover {
        background: var(--surface-hover);
        border-color: var(--border-strong);
        transform: translateY(-1px);
      }
      .btn-sm { padding: 9px 18px; font-size: 0.8125rem; }

      /* Section */
      .section {
        padding-block: clamp(64px, 8vw, 120px);
        position: relative;
      }
      .section-label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.6875rem;
        font-weight: 700;
        letter-spacing: 0.13em;
        text-transform: uppercase;
        color: var(--t4);
        margin-bottom: 18px;
      }
      .section-label::before {
        content: '';
        display: block;
        width: 20px;
        height: 1px;
        background: var(--t4);
      }
      .section-heading {
        font-size: clamp(2rem, 4vw, 3.2rem);
        font-weight: 900;
        color: var(--t1);
        margin-bottom: 20px;
        max-width: 16ch;
      }
      .section-sub {
        font-size: 1.0625rem;
        color: var(--t3);
        line-height: 1.7;
        max-width: 54ch;
      }

      /* Cards */
      .card {
        background: var(--bg1);
        border: 1.5px solid var(--border);
        border-radius: var(--rdl);
        padding: 28px;
        transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
      }
      .card:hover {
        border-color: var(--border-strong);
        box-shadow: 0 8px 32px rgba(0,0,0,0.3);
        transform: translateY(-2px);
      }

      /* Dividers */
      hr { border: none; border-top: 1px solid var(--border); }

      /* Utilities */
      .text-blue { color: var(--blue3); }
      .text-green { color: var(--gap1); }
      .text-purple { color: var(--gap3); }
      .text-muted { color: var(--t3); }
      .text-center { text-align: center; }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--bg0); }
      ::-webkit-scrollbar-thumb { background: var(--bg3); border-radius: 3px; }

      /* Focus */
      :focus-visible { outline: 2px solid var(--blue); outline-offset: 3px; }

      /* Mobile base */
      @media (max-width: 768px) {
        .hide-mobile { display: none !important; }
      }
      @media (min-width: 769px) {
        .hide-desktop { display: none !important; }
      }
    </style>
    <script type="module" crossorigin src="/assets/index-B3Lr0L3R.js"></script>
  </head>
  <body>
    <div id="grid-overlay" aria-hidden="true"></div>
    <div id="root"></div>
  </body>
</html>
