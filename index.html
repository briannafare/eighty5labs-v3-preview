    <style>

        /* ── Light section text */
        --td1: #0F172A;          /* primary text on light */

        /* ── Brand */

        --blue3: #4F8EF7;

        --blue-border: rgba(27,79,255,0.25);

        /* ── Gap / accent colors */
        --gap1: #84CC16;
        --gap1-lt: rgba(132,204,22,0.10);
        --gap1-lt-d: rgba(132,204,22,0.15);
        --gap1-border: rgba(132,204,22,0.25);
        --gap2: #4F8EF7;
        --gap2-lt: rgba(79,142,247,0.10);
        --gap2-lt-d: rgba(79,142,247,0.15);
        --gap2-border: rgba(79,142,247,0.22);
        --gap3: #8B5CF6;
        --gap3-lt: rgba(139,92,246,0.10);
        --gap3-lt-d: rgba(139,92,246,0.15);
        --gap3-border: rgba(139,92,246,0.22);

        /* ── Accent palette (use sparingly — icons, highlights, gradients) */
        --lime: #84CC16;          /* lime / chartreuse accent */
        --lime-lt: rgba(132,204,22,0.12);
        --orange: #FF6B35;        /* complementary warm orange */
        --orange-lt: rgba(255,107,53,0.12);
        --violet: #7C3AED;        /* deep violet for gradients */
        --violet-lt: rgba(124,58,237,0.12);
        /* Multi-stop brand gradient */
        --grad-brand: linear-gradient(135deg, #1B4FFF 0%, #7C3AED 50%, #C8FF00 100%);
        --grad-brand-2: linear-gradient(135deg, #4F8EF7 0%, #8B5CF6 60%, #FF6B35 100%);
        --grad-icon-1: linear-gradient(135deg, #1B4FFF 0%, #4F8EF7 100%);
        --grad-icon-2: linear-gradient(135deg, #7C3AED 0%, #8B5CF6 100%);
        --grad-icon-3: linear-gradient(135deg, #84CC16 0%, #A3E635 100%);

        /* ── Text (dark sections) */
        --t1: #FFFFFF;
        --t2: rgba(255,255,255,0.80);
        --t3: rgba(255,255,255,0.52);
        --t4: rgba(255,255,255,0.30);

        /* ── Borders (dark sections) */
        --border: rgba(255,255,255,0.08);
        --border-strong: rgba(255,255,255,0.15);

        /* ── Radius
             --rd-nav  : nav CTA / small utility (sharp, 6px)
             --rd      : body cards, inputs (10px)
             --rd-btn  : body CTA buttons (full pill, 999px)
             --rdl     : cards (14px)
             --rdxl    : large modals (20px)
        */
        --rd-nav: 6px;
        --rd: 10px;
        --rd-btn: 999px;
        --rdl: 14px;
        --rdxl: 20px;

        /* ── Fonts */
        --fd: 'Plus Jakarta Sans', sans-serif;
        --fb: 'Inter', sans-serif;
        --fl: 'Epilogue', sans-serif;  /* logo only */

        /* ── Motion — single easing curve site-wide */
        --ease: cubic-bezier(.16,1,.3,1);

        /* ── Layout */
        --max-w: 1140px;
        --nav-h: 64px;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html { scroll-behavior: smooth; }

      body {
        background: var(--ls0);
        color: var(--td1);
        font-family: var(--fb);
        font-size: 16px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      /* Subtle noise texture — prevents flat/sterile feel */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
        opacity: 0.035;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-repeat: repeat;
        background-size: 256px 256px;
      }

      /* Grid noise overlay — hero only via mask */
      #grid-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background-image:
          linear-gradient(to right, rgba(255,255,255,0.022) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255,255,255,0.022) 1px, transparent 1px);
        background-size: 72px 72px;
        mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 80%);
        -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 80%);
      }

      #root { position: relative; z-index: 1; min-height: 100vh; }

      /* ── Container */
      .wrap {
        max-width: var(--max-w);
        margin-inline: auto;
        padding-inline: clamp(20px, 5vw, 48px);
        width: 100%;
      }

      /* ── Typography */
      h1, h2, h3, h4, h5 { font-family: var(--fd); letter-spacing: -0.03em; line-height: 1.08; }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         BUTTON SYSTEM — intentional hierarchy
         
         Two families:
         1. .btn-nav-*   → nav CTA (sharp: 6px radius, compact)
         2. .btn         → body CTAs (pill: 999px radius, generous padding)
         
         Within .btn: primary (solid blue) and ghost (outline)
         Ghost adapts to context: dark bg vs light bg via modifier
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

      /* Nav CTA — pill shape to match body buttons */
      .btn-nav {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        border-radius: var(--rd-btn);
        font-family: var(--fd);
        font-size: 0.8125rem;
        font-weight: 700;
        cursor: pointer;
        border: none;
        transition: all 0.2s var(--ease);
        text-decoration: none;
        white-space: nowrap;
        letter-spacing: 0.01em;
      }
      .btn-nav-primary {
        background: #0F172A;
        color: #fff;
      }
      .btn-nav-primary:hover {
        background: #1E293B;
        box-shadow: 0 4px 16px rgba(15,23,42,0.25);
        transform: translateY(-1px);
      }
      .btn-nav-ghost {
        background: transparent;
        color: var(--td2);
        border: 1px solid var(--ls-border);
      }
      .btn-nav-ghost:hover {
        background: var(--ls1);
        border-color: #C5D0E8;
        color: var(--td1);
      }

      /* Body CTAs — pill shape, ada.cx style with flush circle */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 14px 28px;
        border-radius: var(--rd-btn);
        font-family: var(--fd);
        font-size: 0.9375rem;
        font-weight: 700;
        cursor: pointer;
        border: none;
        transition: all 0.25s var(--ease);
        text-decoration: none;
        white-space: nowrap;
        letter-spacing: 0.01em;
      }
      /* When a button has a circle arrow, tighten right padding */
      .btn:has(.btn-arrow-circle) {
        padding: 8px 8px 8px 24px;
        gap: 12px;
      }
      /* The circle arrow itself */
      .btn-arrow-circle {
        width: 42px; height: 42px; border-radius: 50%;
        display: inline-flex; align-items: center; justify-content: center;
        flex-shrink: 0; transition: all 0.2s;
      }
      .btn-arrow-circle svg { width: 16px; height: 16px; }

      /* Primary — solid blue pill, dark circle arrow */
      .btn-primary {
        background: var(--blue);
        color: #fff;
        box-shadow: 0 4px 16px rgba(27,79,255,0.25);
      }
      .btn-primary:hover {
        background: #0A3DE6;
        transform: translateY(-2px) scale(1.02);
        box-shadow: 0 8px 28px rgba(27,79,255,0.40);
        color: #fff;
      }
      .btn-primary .btn-arrow-circle {
        background: #1E293B; color: #fff;
      }
      .btn-primary:hover .btn-arrow-circle { background: #0F172A; }

      /* Accent variant — lime pill with dark circle */
      .btn-accent {
        background: rgba(132,204,22,0.12);
        color: var(--td1);
        border: 1px solid rgba(132,204,22,0.18);
      }
      .btn-accent:hover {
        background: rgba(132,204,22,0.20);
        border-color: rgba(132,204,22,0.30);
        transform: translateY(-2px);
        box-shadow: 0 8px 28px rgba(132,204,22,0.12);
      }
      .btn-accent .btn-arrow-circle {
        background: var(--td1); color: #fff;
      }
      .btn-accent:hover .btn-arrow-circle { background: #84CC16; }

      /* Subtle blue pill — secondary CTA on light bg */
      .btn-soft {
        background: rgba(27,79,255,0.08);
        color: var(--td1);
        border: 1px solid rgba(27,79,255,0.12);
      }
      .btn-soft:hover {
        background: rgba(27,79,255,0.14);
        border-color: rgba(27,79,255,0.22);
        transform: translateY(-2px);
        box-shadow: 0 8px 28px rgba(27,79,255,0.10);
      }
      .btn-soft .btn-arrow-circle {
        background: var(--td1); color: #fff;
      }
      .btn-soft:hover .btn-arrow-circle { background: var(--blue); }

      /* Solid blue — for dark backgrounds */
      .btn-solid {
        background: var(--blue);
        color: #fff;
        box-shadow: 0 4px 16px rgba(27,79,255,0.25);
      }
      .btn-solid:hover {
        background: #0A3DE6;
        transform: translateY(-2px) scale(1.02);
        box-shadow: 0 8px 28px rgba(27,79,255,0.40);
        color: #fff;
      }

      /* Ghost on dark bg */
      .btn-ghost {
        background: rgba(255,255,255,0.06);
        color: var(--t1);
        border: 1.5px solid rgba(255,255,255,0.16);
      }
      .btn-ghost:hover {
        background: rgba(255,255,255,0.10);
        border-color: rgba(132,204,22,0.35);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0,0,0,0.18);
        color: #fff;
      }
      /* Ghost on light bg — white fill with border */
      .btn-ghost-light {
        background: #FFFFFF;
        color: var(--td1);
        border: 1.5px solid var(--ls-border);
      }
      .btn-ghost-light:hover {
        border-color: rgba(27,79,255,0.25);
        background: rgba(27,79,255,0.03);
        color: var(--blue);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(15,23,42,0.06);
      }
      /* Smaller body button variant */
      .btn-sm {
        padding: 10px 20px;
        font-size: 0.875rem;
      }
      .btn-sm:has(.btn-arrow-circle) {
        padding: 6px 6px 6px 18px;
      }
      .btn-sm .btn-arrow-circle {
        width: 36px; height: 36px;
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         AMBIENT DRIFT — slow background glow
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      @keyframes ambient-drift-1 {
        0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.7; }
        25% { transform: translate(40px, -30px) scale(1.08); opacity: 1; }
        50% { transform: translate(-15px, 20px) scale(0.95); opacity: 0.8; }
        75% { transform: translate(30px, 10px) scale(1.05); opacity: 0.9; }
      }
      @keyframes ambient-drift-2 {
        0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.8; }
        25% { transform: translate(-35px, 25px) scale(0.93); opacity: 0.6; }
        50% { transform: translate(25px, -35px) scale(1.1); opacity: 1; }
        75% { transform: translate(-20px, -15px) scale(1.02); opacity: 0.7; }
      }
      @keyframes ambient-drift-3 {
        0%, 100% { transform: translate(0, 0) scale(1); opacity: 0.6; }
        33% { transform: translate(30px, 20px) scale(1.12); opacity: 1; }
        66% { transform: translate(-25px, -30px) scale(0.9); opacity: 0.7; }
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         HERO — centered layout override
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      .hero-centered {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        max-width: 780px;
        margin-inline: auto;
      }

      /* Gap indicator — horizontal numbered row */
      .gap-indicators {
        display: flex;
        align-items: center;
        gap: 0;
        margin-bottom: 28px;
      }
      .gap-ind-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 18px;
        border-radius: 12px;
        cursor: pointer;
        transition: background 0.2s;
        position: relative;
      }
      .gap-ind-num {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--fd);
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.02em;
        flex-shrink: 0;
        transition: all 0.25s;
      }
      .gap-ind-label {
        font-family: var(--fd);
        font-size: 0.8125rem;
        font-weight: 700;
        letter-spacing: -0.01em;
        white-space: nowrap;
        transition: color 0.25s;
      }
      .gap-ind-divider {
        width: 28px;
        height: 1px;
        background: var(--ls-border);
        flex-shrink: 0;
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         SCROLL-PEEK demo container
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      .scroll-peek-wrap {
        width: 100%;
        max-width: 720px;
        margin-inline: auto;
        margin-top: 56px;
        position: relative;
      }
      .scroll-peek-inner {
        border-radius: 20px 20px 0 0;
        overflow: hidden;
        box-shadow: 0 -4px 60px rgba(27,79,255,0.12), 0 20px 80px rgba(15,23,42,0.14);
        border: 1px solid var(--ls-border);
        border-bottom: none;
        background: #fff;
        transform-origin: bottom center;
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         STICKY GAPS SCROLL layout
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      .gaps-sticky-layout {
        display: grid;
        grid-template-columns: 1fr 420px;
        gap: clamp(32px, 4vw, 64px);
        align-items: start;
      }
      .gaps-scroll-col {
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      .gap-scroll-item {
        padding: 40px 0;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        opacity: 0.35;
        transition: opacity 0.4s;
      }
      .gap-scroll-item:last-child { border-bottom: none; }
      .gap-scroll-item.active { opacity: 1; }
      .gaps-sticky-col {
        position: sticky;
        top: 100px;
      }

      @media (max-width: 860px) {
        .gaps-sticky-layout { grid-template-columns: 1fr; }
        .gaps-sticky-col { position: static; }
        .scroll-peek-wrap { margin-top: 32px; }
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         Dark (.section-dark) and light (.section, .section-light)
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      .section {
        padding-block: clamp(100px, 11vw, 160px);
        position: relative;
      }
      .section-dark {
        padding-block: clamp(100px, 11vw, 160px);
        position: relative;
        background: var(--bg0);
        color: var(--t1);
      }
      .section-light {
        padding-block: clamp(100px, 11vw, 160px);
        position: relative;
        background: var(--ls1);
      }
      .section-white {
        padding-block: clamp(100px, 11vw, 160px);
        position: relative;
        background: var(--ls0);
      }

      /* Section labels — adapt to bg */
      .section-label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.13em;
        text-transform: uppercase;
        margin-bottom: 16px;
      }
      .section-label::before {
        content: '';
        display: block;
        width: 18px;
        height: 1px;
      }
      /* label on dark bg */
      .section-dark .section-label,
      .dark-section .section-label { color: var(--t4); }
      .section-dark .section-label::before,
      .dark-section .section-label::before { background: var(--t4); }
      /* label on light bg (default) */
      .section-label { color: var(--td3); }
      .section-label::before { background: var(--td3); }

      /* Section headings — upgraded scale */
      .section-heading {
        font-size: clamp(2rem, 3.5vw, 2.75rem);
        font-weight: 700;
        margin-bottom: 18px;
        max-width: 20ch;
        line-height: 1.07;
        letter-spacing: -0.04em;
      }
      .section-heading-dark { color: var(--t1); }
      .section-heading-light { color: var(--td1); }
      /* Default (light bg) */
      .section-heading { color: var(--td1); }
      /* Override for dark sections */
      .section-dark .section-heading { color: var(--t1); }

      /* Heading accent — display font, color only (no serif italic) */
      .heading-accent {
        font-family: var(--fd);
        font-style: normal;
        font-weight: 700;
      }

      .section-sub {
        font-size: 1.0625rem;
        line-height: 1.75;
        max-width: 54ch;
      }
      .section-sub-dark { color: var(--t3); }
      /* Default (light bg) */
      .section-sub { color: var(--td2); }
      /* Override for dark sections */
      .section-dark .section-sub { color: var(--t3); }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         CARDS
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      /* Card on dark bg */
      .card {
        background: var(--bg1);
        border: 1.5px solid var(--border);
        border-radius: var(--rdl);
        padding: 28px;
        transition: border-color 0.3s var(--ease), box-shadow 0.3s var(--ease), transform 0.3s var(--ease), background 0.3s var(--ease);
      }
      .card:hover {
        border-color: rgba(79,142,247,0.30);
        background: var(--bg2);
        box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        transform: translateY(-4px);
      }
      /* Card on light bg */
      .card-light {
        background: var(--ls-card);
        border: 1.5px solid var(--ls-border);
        border-radius: var(--rdl);
        padding: 28px;
        box-shadow: 0 2px 12px rgba(15,23,42,0.06);
        transition: border-color 0.3s var(--ease), box-shadow 0.3s var(--ease), transform 0.3s var(--ease), background 0.3s var(--ease);
      }
      .card-light:hover {
        border-color: rgba(27,79,255,0.28);
        background: #FBFCFF;
        box-shadow: 0 10px 30px rgba(15,23,42,0.10), 0 2px 8px rgba(27,79,255,0.06);
        transform: translateY(-4px);
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         UTILITIES
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      hr { border: none; border-top: 1px solid var(--border); }
      hr.hr-light { border-top-color: var(--ls-border); }

      .text-blue { color: var(--blue3); }
      .text-blue-dark { color: var(--blue2); }
      .text-green { color: var(--gap1); }
      .text-purple { color: var(--gap3); }
      .text-muted { color: var(--t3); }
      .text-muted-light { color: var(--td3); }
      .text-center { text-align: center; }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--ls1); }
      ::-webkit-scrollbar-thumb { background: #C5D0E8; border-radius: 3px; }

      /* Focus */
      :focus-visible { outline: 2px solid var(--blue); outline-offset: 3px; }

      /* Hero grid pattern overlay */
      .hero-pattern {
        position: relative;
      }
      .hero-pattern::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(15,23,42,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(15,23,42,0.04) 1px, transparent 1px);
        background-size: 52px 52px;
        mask-image: radial-gradient(ellipse 90% 85% at 68% 35%, black 0%, transparent 70%);
        -webkit-mask-image: radial-gradient(ellipse 90% 85% at 68% 35%, black 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }
      .hero-pattern > * { position: relative; z-index: 1; }

      /* Dark section variant: bg1 instead of bg0 */
      .section-dark-alt {
        padding-block: clamp(100px, 11vw, 160px);
        position: relative;
        background: linear-gradient(180deg, #0D1321 0%, var(--bg1) 50%, #0D1321 100%);
        color: var(--t1);
        overflow: hidden;
      }
      .section-dark-alt::before {
        content: '';
        position: absolute;
        top: 0; left: 50%; transform: translateX(-50%);
        width: 80%; max-width: 900px; height: 320px;
        background: radial-gradient(ellipse 60% 55% at 50% 0%, rgba(27,79,255,0.08) 0%, transparent 70%);
        pointer-events: none;
      }
      .section-dark-alt .section-label { color: var(--t4); }
      .section-dark-alt .section-label::before { background: var(--t4); }
      .section-dark-alt .section-heading { color: var(--t1); }
      .section-dark-alt .section-sub { color: var(--t3); }

      /* Light section top border (matches V2) */
      .section-light { border-top: 1px solid var(--ls-border); }
      .section-white { border-top: 1px solid var(--ls-border); }
      .section-white + .section-white { border-top: none; }

      /* Mobile */
      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         THREE GAPS FRAMEWORK — horizontal flow
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      .gaps-framework-outer {
        display: grid;
        grid-template-columns: 1fr auto 1fr auto 1fr;
        gap: 0;
        align-items: stretch;
      }
      .gaps-framework-card {
        height: 100%;
        padding: clamp(22px, 3vw, 36px);
        display: flex;
        flex-direction: column;
      }
      .gaps-framework-connector {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 10px;
        min-width: 52px;
        flex-shrink: 0;
      }

      @media (max-width: 768px) {
        .hide-mobile { display: none !important; }
        .hero-grid { grid-template-columns: 1fr !important; }
        .gaps-calc-grid { grid-template-columns: 1fr !important; }
        .pricing-grid { grid-template-columns: 1fr !important; }
        .addons-grid { grid-template-columns: 1fr !important; }
        .stats-grid { grid-template-columns: repeat(2, 1fr) !important; }
        .ind-grid { grid-template-columns: repeat(2, 1fr) !important; }
        .ind-grid > :last-child { grid-column: span 2; }
        .ind-panel-grid { grid-template-columns: 1fr !important; }
        .footer-grid { grid-template-columns: 1fr !important; gap: 32px !important; }
        /* Gap card grids */
        .gap-card-grid { grid-template-columns: 1fr !important; }
        .gap-card-grid > div:last-child { text-align: left !important; margin-top: 8px; }
        .gap-deep-grid { grid-template-columns: 1fr !important; }
        .gap-deep-text { order: 0 !important; }
        .gap-deep-stat { order: 1 !important; margin-top: 8px; }
        /* Three gaps framework */
        .gaps-framework-outer { grid-template-columns: 1fr !important; }
        .gaps-framework-connector { display: none !important; }
        .gaps-framework-card { height: auto; }
      }
      @media (min-width: 769px) {
        .hide-desktop { display: none !important; }
      }

      /* Range slider thumb styling */
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #fff;
        border: 2px solid rgba(255,255,255,0.3);
        cursor: pointer;
        box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      }
      input[type="range"]::-moz-range-thumb {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #fff;
        border: 2px solid rgba(255,255,255,0.3);
        cursor: pointer;
        box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      }
    </style>
  </head>
