<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>eighty5labs | AI Operating System for Local Business</title>
    <meta name="description" content="AI agents that close the visibility, reputation, and conversion gaps for local service businesses. Get found in AI search. Dominate Google Maps. Never miss a call." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        /* ── Dark section palette (hero, dark bands) */
        --bg0: #080C17;
        --bg1: #0F1623;
        --bg2: #161E2E;
        --bg3: #1C2540;
        --surface: rgba(255,255,255,0.05);
        --surface-hover: rgba(255,255,255,0.09);

        /* ── Light section palette (alternating bands) */
        --ls0: #FFFFFF;          /* pure white sections */
        --ls1: #F7F9FF;          /* off-white / very light blue-grey */
        --ls2: #EEF2FB;          /* subtle section divider */
        --ls-border: #DDE5F2;    /* border on light bg */
        --ls-surface: rgba(27,79,255,0.05);
        --ls-card: #FFFFFF;

        /* ── Light section text */
        --td1: #0F172A;          /* primary text on light */
        --td2: #334155;          /* secondary text on light */
        --td3: #64748B;          /* muted text on light */

        /* ── Brand */
        --blue: #1B4FFF;
        --blue2: #2B5FFF;
        --blue3: #4F8EF7;
        --blue-lt: rgba(27,79,255,0.10);
        --blue-border: rgba(27,79,255,0.25);

        /* ── Gap / accent colors */
        --gap1: #14B8A6;
        --gap1-lt: rgba(20,184,166,0.10);
        --gap1-lt-d: rgba(20,184,166,0.15);
        --gap1-border: rgba(20,184,166,0.25);
        --gap2: #4F8EF7;
        --gap2-lt: rgba(79,142,247,0.10);
        --gap2-lt-d: rgba(79,142,247,0.15);
        --gap2-border: rgba(79,142,247,0.22);
        --gap3: #8B5CF6;
        --gap3-lt: rgba(139,92,246,0.10);
        --gap3-lt-d: rgba(139,92,246,0.15);
        --gap3-border: rgba(139,92,246,0.22);

        /* ── Accent palette (use sparingly — icons, highlights, gradients) */
        --lime: #C8FF00;          /* electric lime / chartreuse */
        --lime-lt: rgba(200,255,0,0.12);
        --orange: #FF6B35;        /* complementary warm orange */
        --orange-lt: rgba(255,107,53,0.12);
        --violet: #7C3AED;        /* deep violet for gradients */
        --violet-lt: rgba(124,58,237,0.12);
        /* Multi-stop brand gradient */
        --grad-brand: linear-gradient(135deg, #1B4FFF 0%, #7C3AED 50%, #C8FF00 100%);
        --grad-brand-2: linear-gradient(135deg, #4F8EF7 0%, #8B5CF6 60%, #FF6B35 100%);
        --grad-icon-1: linear-gradient(135deg, #1B4FFF 0%, #4F8EF7 100%);
        --grad-icon-2: linear-gradient(135deg, #7C3AED 0%, #8B5CF6 100%);
        --grad-icon-3: linear-gradient(135deg, #14B8A6 0%, #2DD4BF 100%);

        /* ── Text (dark sections) */
        --t1: #FFFFFF;
        --t2: rgba(255,255,255,0.80);
        --t3: rgba(255,255,255,0.52);
        --t4: rgba(255,255,255,0.30);

        /* ── Borders (dark sections) */
        --border: rgba(255,255,255,0.08);
        --border-strong: rgba(255,255,255,0.15);

        /* ── Radius
             --rd-nav  : nav CTA / small utility (sharp, 6px)
             --rd      : body cards, inputs (10px)
             --rd-btn  : body CTA buttons (full pill, 999px)
             --rdl     : cards (14px)
             --rdxl    : large modals (20px)
        */
        --rd-nav: 6px;
        --rd: 10px;
        --rd-btn: 999px;
        --rdl: 14px;
        --rdxl: 20px;

        /* ── Fonts */
        --fd: 'Epilogue', sans-serif;
        --fb: 'Inter', sans-serif;

        /* ── Motion — single easing curve site-wide */
        --ease: cubic-bezier(.16,1,.3,1);

        /* ── Layout */
        --max-w: 1140px;
        --nav-h: 64px;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html { scroll-behavior: smooth; }

      body {
        background: var(--ls0);
        color: var(--td1);
        font-family: var(--fb);
        font-size: 16px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      /* Subtle noise texture — prevents flat/sterile feel */
      body::after {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 9999;
        opacity: 0.035;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-repeat: repeat;
        background-size: 256px 256px;
      }

      /* Grid noise overlay — hero only via mask */
      #grid-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background-image:
          linear-gradient(to right, rgba(255,255,255,0.022) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255,255,255,0.022) 1px, transparent 1px);
        background-size: 72px 72px;
        mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 80%);
        -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 80%);
      }

      #root { position: relative; z-index: 1; min-height: 100vh; }

      /* ── Container */
      .wrap {
        max-width: var(--max-w);
        margin-inline: auto;
        padding-inline: clamp(20px, 5vw, 48px);
        width: 100%;
      }

      /* ── Typography */
      h1, h2, h3, h4, h5 { font-family: var(--fd); letter-spacing: -0.03em; line-height: 1.08; }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         BUTTON SYSTEM — intentional hierarchy
         
         Two families:
         1. .btn-nav-*   → nav CTA (sharp: 6px radius, compact)
         2. .btn         → body CTAs (pill: 999px radius, generous padding)
         
         Within .btn: primary (solid blue) and ghost (outline)
         Ghost adapts to context: dark bg vs light bg via modifier
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

      /* Nav CTA — sharp corners, compact, utility feel */
      .btn-nav {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 8px 16px;
        border-radius: var(--rd-nav);
        font-family: var(--fd);
        font-size: 0.8125rem;
        font-weight: 800;
        cursor: pointer;
        border: none;
        transition: all 0.2s var(--ease);
        text-decoration: none;
        white-space: nowrap;
        letter-spacing: 0.01em;
      }
      .btn-nav-primary {
        background: linear-gradient(90deg, #1B4FFF, #4F7CFF);
        color: #fff;
      }
      .btn-nav-primary:hover {
        background: linear-gradient(90deg, #0A3DE6, #3B6BFF);
        box-shadow: 0 4px 20px rgba(27,79,255,0.42);
      }
      .btn-nav-ghost {
        background: transparent;
        color: var(--td2);
        border: 1px solid var(--ls-border);
      }
      .btn-nav-ghost:hover {
        background: var(--ls1);
        border-color: #C5D0E8;
        color: var(--td1);
      }

      /* Body CTAs — pill shape, generous, confident */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 14px 28px;
        border-radius: var(--rd-btn);
        font-family: var(--fd);
        font-size: 0.9375rem;
        font-weight: 800;
        cursor: pointer;
        border: none;
        transition: all 0.25s var(--ease);
        text-decoration: none;
        white-space: nowrap;
        letter-spacing: 0.01em;
      }
      /* Primary — gradient fill, works on any bg */
      .btn-primary {
        background: linear-gradient(90deg, #1B4FFF, #4F7CFF);
        color: #fff;
        box-shadow: 0 4px 16px rgba(27,79,255,0.25);
      }
      .btn-primary:hover {
        background: linear-gradient(90deg, #0A3DE6, #3B6BFF);
        transform: translateY(-2px) scale(1.02);
        box-shadow: 0 8px 28px rgba(27,79,255,0.45);
        color: #fff;
      }
      /* Ghost on dark bg */
      .btn-ghost {
        background: rgba(255,255,255,0.06);
        color: var(--t1);
        border: 1.5px solid rgba(255,255,255,0.16);
      }
      .btn-ghost:hover {
        background: rgba(255,255,255,0.12);
        border-color: rgba(255,255,255,0.30);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      }
      /* Ghost on light bg — white fill with border */
      .btn-ghost-light {
        background: #FFFFFF;
        color: var(--td1);
        border: 1.5px solid var(--ls-border);
      }
      .btn-ghost-light:hover {
        border-color: var(--blue-border);
        background: rgba(27,79,255,0.03);
        color: var(--blue);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(27,79,255,0.08);
      }
      /* Smaller body button variant */
      .btn-sm {
        padding: 10px 20px;
        font-size: 0.875rem;
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         HERO — centered layout override
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      .hero-centered {
        display: flex;
        flex-direction: column;
        align-items: center;
        text-align: center;
        max-width: 780px;
        margin-inline: auto;
      }

      /* Gap indicator — horizontal numbered row */
      .gap-indicators {
        display: flex;
        align-items: center;
        gap: 0;
        margin-bottom: 28px;
      }
      .gap-ind-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 18px;
        border-radius: 12px;
        cursor: pointer;
        transition: background 0.2s;
        position: relative;
      }
      .gap-ind-num {
        width: 26px;
        height: 26px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: var(--fd);
        font-size: 0.7rem;
        font-weight: 900;
        letter-spacing: 0.02em;
        flex-shrink: 0;
        transition: all 0.25s;
      }
      .gap-ind-label {
        font-family: var(--fd);
        font-size: 0.8125rem;
        font-weight: 700;
        letter-spacing: -0.01em;
        white-space: nowrap;
        transition: color 0.25s;
      }
      .gap-ind-divider {
        width: 28px;
        height: 1px;
        background: var(--ls-border);
        flex-shrink: 0;
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         SCROLL-PEEK demo container
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      .scroll-peek-wrap {
        width: 100%;
        max-width: 720px;
        margin-inline: auto;
        margin-top: 56px;
        position: relative;
      }
      .scroll-peek-inner {
        border-radius: 20px 20px 0 0;
        overflow: hidden;
        box-shadow: 0 -4px 60px rgba(27,79,255,0.12), 0 20px 80px rgba(15,23,42,0.14);
        border: 1px solid var(--ls-border);
        border-bottom: none;
        background: #fff;
        transform-origin: bottom center;
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         STICKY GAPS SCROLL layout
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      .gaps-sticky-layout {
        display: grid;
        grid-template-columns: 1fr 420px;
        gap: clamp(32px, 4vw, 64px);
        align-items: start;
      }
      .gaps-scroll-col {
        display: flex;
        flex-direction: column;
        gap: 0;
      }
      .gap-scroll-item {
        padding: 40px 0;
        border-bottom: 1px solid rgba(255,255,255,0.06);
        opacity: 0.35;
        transition: opacity 0.4s;
      }
      .gap-scroll-item:last-child { border-bottom: none; }
      .gap-scroll-item.active { opacity: 1; }
      .gaps-sticky-col {
        position: sticky;
        top: 100px;
      }

      @media (max-width: 860px) {
        .gaps-sticky-layout { grid-template-columns: 1fr; }
        .gaps-sticky-col { position: static; }
        .scroll-peek-wrap { margin-top: 32px; }
      }
         Dark (.section-dark) and light (.section, .section-light)
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      .section {
        padding-block: clamp(100px, 11vw, 160px);
        position: relative;
      }
      .section-dark {
        padding-block: clamp(100px, 11vw, 160px);
        position: relative;
        background: var(--bg0);
        color: var(--t1);
      }
      .section-light {
        padding-block: clamp(100px, 11vw, 160px);
        position: relative;
        background: var(--ls1);
      }
      .section-white {
        padding-block: clamp(100px, 11vw, 160px);
        position: relative;
        background: var(--ls0);
      }

      /* Section labels — adapt to bg */
      .section-label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.68rem;
        font-weight: 700;
        letter-spacing: 0.13em;
        text-transform: uppercase;
        margin-bottom: 16px;
      }
      .section-label::before {
        content: '';
        display: block;
        width: 18px;
        height: 1px;
      }
      /* label on dark bg */
      .section-dark .section-label,
      .dark-section .section-label { color: var(--t4); }
      .section-dark .section-label::before,
      .dark-section .section-label::before { background: var(--t4); }
      /* label on light bg (default) */
      .section-label { color: var(--td3); }
      .section-label::before { background: var(--td3); }

      /* Section headings — upgraded scale */
      .section-heading {
        font-size: clamp(2rem, 3.5vw, 2.75rem);
        font-weight: 900;
        margin-bottom: 18px;
        max-width: 20ch;
        line-height: 1.07;
        letter-spacing: -0.04em;
      }
      .section-heading-dark { color: var(--t1); }
      .section-heading-light { color: var(--td1); }
      /* Default (light bg) */
      .section-heading { color: var(--td1); }
      /* Override for dark sections */
      .section-dark .section-heading { color: var(--t1); }

      /* Heading accent — display font, color only (no serif italic) */
      .heading-accent {
        font-family: var(--fd);
        font-style: normal;
        font-weight: 900;
      }

      .section-sub {
        font-size: 1.0625rem;
        line-height: 1.75;
        max-width: 54ch;
      }
      .section-sub-dark { color: var(--t3); }
      /* Default (light bg) */
      .section-sub { color: var(--td2); }
      /* Override for dark sections */
      .section-dark .section-sub { color: var(--t3); }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         CARDS
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      /* Card on dark bg */
      .card {
        background: var(--bg1);
        border: 1.5px solid var(--border);
        border-radius: var(--rdl);
        padding: 28px;
        transition: border-color 0.3s var(--ease), box-shadow 0.3s var(--ease), transform 0.3s var(--ease), background 0.3s var(--ease);
      }
      .card:hover {
        border-color: rgba(79,142,247,0.30);
        background: var(--bg2);
        box-shadow: 0 10px 30px rgba(0,0,0,0.25);
        transform: translateY(-4px);
      }
      /* Card on light bg — Fix 1: shared interaction system */
      .card-light, .card-hover {
        background: var(--ls-card);
        border: 1.5px solid var(--ls-border);
        border-radius: var(--rdl);
        padding: 28px;
        box-shadow: 0 2px 12px rgba(15,23,42,0.06);
        transition: border-color 0.3s var(--ease), box-shadow 0.3s var(--ease), transform 0.3s var(--ease), background 0.3s var(--ease);
        cursor: default;
      }
      .card-light:hover, .card-hover:hover {
        border-color: rgba(27,79,255,0.28);
        background: #FBFCFF;
        box-shadow: 0 10px 30px rgba(15,23,42,0.10), 0 2px 8px rgba(27,79,255,0.06);
        transform: translateY(-4px);
      }
      /* Clickable card variant */
      .card-hover { cursor: pointer; }
      .card-hover:active { transform: translateY(-2px) scale(0.99); }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         UTILITIES
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      hr { border: none; border-top: 1px solid var(--border); }
      hr.hr-light { border-top-color: var(--ls-border); }

      .text-blue { color: var(--blue3); }
      .text-blue-dark { color: var(--blue2); }
      .text-green { color: var(--gap1); }
      .text-purple { color: var(--gap3); }
      .text-muted { color: var(--t3); }
      .text-muted-light { color: var(--td3); }
      .text-center { text-align: center; }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--ls1); }
      ::-webkit-scrollbar-thumb { background: #C5D0E8; border-radius: 3px; }

      /* Focus */
      :focus-visible { outline: 2px solid var(--blue); outline-offset: 3px; }

      /* Hero grid pattern overlay */
      .hero-pattern {
        position: relative;
      }
      .hero-pattern::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(15,23,42,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(15,23,42,0.04) 1px, transparent 1px);
        background-size: 52px 52px;
        mask-image: radial-gradient(ellipse 90% 85% at 68% 35%, black 0%, transparent 70%);
        -webkit-mask-image: radial-gradient(ellipse 90% 85% at 68% 35%, black 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }
      .hero-pattern > * { position: relative; z-index: 1; }

      /* Dark section variant: bg1 instead of bg0 */
      .section-dark-alt {
        padding-block: clamp(100px, 11vw, 160px);
        position: relative;
        background: linear-gradient(180deg, #0D1321 0%, var(--bg1) 50%, #0D1321 100%);
        color: var(--t1);
        overflow: hidden;
      }
      .section-dark-alt::before {
        content: '';
        position: absolute;
        top: 0; left: 50%; transform: translateX(-50%);
        width: 80%; max-width: 900px; height: 320px;
        background: radial-gradient(ellipse 60% 55% at 50% 0%, rgba(27,79,255,0.08) 0%, transparent 70%);
        pointer-events: none;
      }
      .section-dark-alt .section-label { color: var(--t4); }
      .section-dark-alt .section-label::before { background: var(--t4); }
      .section-dark-alt .section-heading { color: var(--t1); }
      .section-dark-alt .section-sub { color: var(--t3); }

      /* Light section top border (matches V2) */
      .section-light { border-top: 1px solid var(--ls-border); }
      .section-white { border-top: 1px solid var(--ls-border); }
      .section-white + .section-white { border-top: none; }

      /* Mobile */
      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         THREE GAPS FRAMEWORK — horizontal flow
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      .gaps-framework-outer {
        display: grid;
        grid-template-columns: 1fr auto 1fr auto 1fr;
        gap: 0;
        align-items: stretch;
      }
      .gaps-framework-card {
        height: 100%;
        padding: clamp(22px, 3vw, 36px);
        display: flex;
        flex-direction: column;
      }
      .gaps-framework-connector {
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 0 10px;
        min-width: 52px;
        flex-shrink: 0;
      }

      @media (max-width: 768px) {
        .hide-mobile { display: none !important; }
        .hero-grid { grid-template-columns: 1fr !important; }
        .gaps-calc-grid { grid-template-columns: 1fr !important; }
        .pricing-grid { grid-template-columns: 1fr !important; }
        .addons-grid { grid-template-columns: 1fr !important; }
        .stats-grid { grid-template-columns: repeat(2, 1fr) !important; }
        .ind-grid { grid-template-columns: repeat(2, 1fr) !important; }
        .ind-grid > :last-child { grid-column: span 2; }
        .ind-panel-grid { grid-template-columns: 1fr !important; }
        .footer-grid { grid-template-columns: 1fr 1fr !important; gap: 32px !important; }
        /* Gap card grids */
        .gap-card-grid { grid-template-columns: 1fr !important; }
        .gap-card-grid > div:last-child { text-align: left !important; margin-top: 8px; }
        .gap-deep-grid { grid-template-columns: 1fr !important; }
        .gap-deep-text { order: 0 !important; }
        .gap-deep-stat { order: 1 !important; margin-top: 8px; }
        /* Three gaps framework */
        .gaps-framework-outer { grid-template-columns: 1fr !important; }
        .gaps-framework-connector { display: none !important; }
        .gaps-framework-card { height: auto; }
      }
      @media (min-width: 769px) {
        .hide-desktop { display: none !important; }
      }

      /* Range slider thumb styling */
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #fff;
        border: 2px solid rgba(255,255,255,0.3);
        cursor: pointer;
        box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      }
      input[type="range"]::-moz-range-thumb {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #fff;
        border: 2px solid rgba(255,255,255,0.3);
        cursor: pointer;
        box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         Fix 5: Premium display typography
         Used 3 times: hero, 3-gaps chapter, final CTA
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      .display-heading {
        font-family: var(--fd);
        font-weight: 900;
        letter-spacing: -0.06em;
        line-height: 1.02;
      }
      .display-heading .gradient-word {
        background: linear-gradient(120deg, #1B4FFF 0%, #5B8EFF 50%, #8B5CF6 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      @keyframes reveal-wipe {
        from { clip-path: inset(0 100% 0 0); }
        to { clip-path: inset(0 0 0 0); }
      }
      .reveal-wipe {
        animation: reveal-wipe 0.8s cubic-bezier(.16,1,.3,1) both;
        animation-delay: 0.3s;
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         GlassFrame — WOW 3
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      .glass-frame {
        position: relative;
      }
      .glass-frame__inner {
        border-radius: 20px;
        overflow: hidden;
        border: 1px solid var(--ls-border);
        background: #fff;
        box-shadow:
          0 4px 40px rgba(15,23,42,0.10),
          0 20px 80px rgba(15,23,42,0.07),
          0 2px 12px rgba(27,79,255,0.04),
          inset 0 1px 0 rgba(255,255,255,0.6);
      }
      .glass-frame__chip {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        padding: 8px 14px;
        background: #fff;
        border: 1px solid var(--ls-border);
        border-radius: 10px;
        box-shadow: 0 4px 16px rgba(15,23,42,0.10), 0 1px 3px rgba(0,0,0,0.04);
        font-family: var(--fd);
        font-size: 0.7rem;
        font-weight: 700;
        color: var(--td2);
        white-space: nowrap;
        pointer-events: none;
      }
      .glass-frame__chip-icon {
        display: flex;
        align-items: center;
        color: var(--td3);
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         SystemStatusRail — WOW 4
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      .status-rail {
        position: fixed;
        left: clamp(16px, 2.5vw, 32px);
        top: 50%;
        transform: translateY(-50%);
        z-index: 50;
        display: flex;
        flex-direction: column;
      }
      .status-rail__track {
        display: flex;
        flex-direction: column;
        gap: 0;
        background: rgba(255,255,255,0.85);
        backdrop-filter: blur(12px);
        border: 1px solid var(--ls-border);
        border-radius: 14px;
        padding: 14px 12px;
        box-shadow: 0 4px 20px rgba(15,23,42,0.08);
      }
      .status-rail__step {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 6px 4px;
        position: relative;
      }
      .status-rail__line {
        position: absolute;
        left: 10px;
        top: -8px;
        width: 1.5px;
        height: 12px;
        transition: background 0.35s, opacity 0.35s;
      }
      .status-rail__dot {
        width: 14px;
        height: 14px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        position: relative;
        transition: all 0.35s;
      }
      .status-rail__label {
        font-family: var(--fd);
        font-size: 0.68rem;
        letter-spacing: -0.01em;
        transition: color 0.35s, font-weight 0.35s;
        white-space: nowrap;
      }

      /* Mobile pill */
      .status-pill {
        position: fixed;
        top: calc(var(--nav-h) + 8px);
        left: 50%;
        transform: translateX(-50%);
        z-index: 50;
        background: rgba(255,255,255,0.9);
        backdrop-filter: blur(8px);
        border: 1px solid var(--ls-border);
        border-radius: 10px;
        padding: 8px 16px;
        box-shadow: 0 2px 12px rgba(15,23,42,0.06);
      }
      .status-pill__track {
        display: flex;
        gap: 4px;
        width: 120px;
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         HeroSystemSim — WOW 1
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      .hero-sim {
        background: #FAFBFE;
        border: 1px solid var(--ls-border);
        border-radius: 18px;
        padding: clamp(16px, 2.5vw, 24px);
        overflow: hidden;
      }
      .hero-sim__lanes {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        margin-bottom: 16px;
      }
      .hero-sim__lane {
        background: #fff;
        border: 1px solid var(--ls-border);
        border-radius: 12px;
        padding: 14px;
        position: relative;
        min-height: 140px;
      }
      .hero-sim__lane-header {
        display: flex;
        align-items: center;
        gap: 7px;
        margin-bottom: 12px;
      }
      .hero-sim__lane-dot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .hero-sim__lane-label {
        font-family: var(--fd);
        font-weight: 800;
        font-size: 0.68rem;
        letter-spacing: -0.01em;
      }
      .hero-sim__lane-flow {
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-height: 70px;
      }
      .hero-sim__signal {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        background: #FAFBFE;
        border: 1px solid var(--ls-border);
        border-radius: 6px;
        font-size: 0.65rem;
        white-space: nowrap;
        width: fit-content;
      }
      .hero-sim__signal-label {
        font-family: var(--fd);
        font-weight: 700;
        color: var(--td2);
      }
      .hero-sim__signal-outcome {
        font-family: var(--fd);
        font-weight: 800;
        font-size: 0.6rem;
      }
      .hero-sim__lane-idle {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 0.62rem;
        color: #94A3B8;
        font-family: var(--fd);
        font-weight: 600;
      }
      .hero-sim__tooltip {
        position: absolute;
        bottom: 100%;
        left: 0;
        right: 0;
        background: #fff;
        border: 1px solid var(--ls-border);
        border-radius: 10px;
        padding: 10px 12px;
        box-shadow: 0 8px 24px rgba(15,23,42,0.12);
        z-index: 10;
        margin-bottom: 6px;
        display: flex;
        flex-direction: column;
        gap: 5px;
      }
      .hero-sim__tooltip-item {
        display: flex;
        align-items: flex-start;
        gap: 7px;
        font-size: 0.68rem;
        color: var(--td2);
        font-weight: 500;
        line-height: 1.3;
      }
      .hero-sim__tray {
        background: #fff;
        border: 1px solid var(--ls-border);
        border-radius: 10px;
        padding: 12px 16px;
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .hero-sim__tray-label {
        font-family: var(--fd);
        font-weight: 700;
        font-size: 0.6rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #94A3B8;
        white-space: nowrap;
      }
      .hero-sim__tray-items {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      .hero-sim__tray-item {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 4px 10px;
        border: 1px solid;
        border-radius: 6px;
        font-family: var(--fd);
        font-weight: 700;
        font-size: 0.65rem;
        color: var(--td2);
      }
      @media (max-width: 768px) {
        .hero-sim__lanes { grid-template-columns: 1fr; }
        .hero-sim__lane { min-height: 100px; }
        .hero-sim__tooltip { position: static; margin-bottom: 0; margin-top: 8px; }
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         LeakToSealScrollScene — WOW 2
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      .leak-scene {
        max-width: 400px;
        margin-inline: auto;
        padding: 40px 0;
      }
      .leak-scene__pipe {
        position: relative;
        min-height: 360px;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
      }
      .leak-scene__pipe-line {
        position: absolute;
        left: 50%;
        top: 0;
        bottom: 0;
        width: 3px;
        background: linear-gradient(180deg, var(--ls-border) 0%, #4F8EF720 50%, var(--ls-border) 100%);
        transform: translateX(-50%);
        border-radius: 2px;
      }
      .leak-scene__input, .leak-scene__outcome {
        position: relative;
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 16px;
        background: #fff;
        border: 1px solid var(--ls-border);
        border-radius: 8px;
        font-family: var(--fd);
        font-weight: 700;
        font-size: 0.75rem;
        color: var(--td2);
        z-index: 2;
      }
      .leak-scene__input-dot {
        width: 6px; height: 6px; border-radius: 50%; background: #94A3B8;
      }
      .leak-scene__outcome {
        margin-top: auto;
      }
      .leak-scene__outcome-dot {
        width: 6px; height: 6px; border-radius: 50%; background: #14B8A6;
      }
      .leak-scene__crack {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        align-items: center;
        gap: 12px;
        z-index: 2;
        width: 100%;
        justify-content: center;
      }
      .leak-scene__crack-mark {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 14px;
        border-radius: 8px;
        position: relative;
      }
      .leak-scene__crack-label {
        font-family: var(--fd);
        font-weight: 700;
        font-size: 0.7rem;
        color: #fff;
        white-space: nowrap;
      }
      .leak-scene__particle {
        position: absolute;
        right: -8px;
        top: 50%;
        transform: translateY(-50%);
        width: 5px;
        height: 5px;
        border-radius: 50%;
      }
      .leak-scene__seal {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 6px 12px;
        background: #fff;
        border: 1.5px solid;
        border-radius: 8px;
        font-family: var(--fd);
        font-weight: 700;
        font-size: 0.68rem;
        color: var(--td2);
      }
      .leak-scene__seal-check {
        width: 16px;
        height: 16px;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         OutcomeSwitcher — WOW 5
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      .outcome-switcher {
        max-width: 400px;
        margin-inline: auto;
      }
      .outcome-switcher__card {
        padding: 28px;
      }
      .outcome-switcher__lead {
        margin-bottom: 20px;
      }
      .outcome-switcher__lead-badge {
        display: inline-flex;
        align-items: center;
        gap: 7px;
        font-family: var(--fd);
        font-weight: 700;
        font-size: 0.65rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #8B5CF6;
        margin-bottom: 8px;
      }
      .outcome-switcher__lead-name {
        font-family: var(--fd);
        font-weight: 900;
        font-size: 1.1rem;
        color: var(--td1);
        letter-spacing: -0.02em;
        margin-bottom: 3px;
      }
      .outcome-switcher__lead-detail {
        font-size: 0.78rem;
        color: var(--td3);
      }
      .outcome-switcher__choices {
        display: flex;
        gap: 8px;
      }
      .outcome-switcher__btn {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        padding: 12px 14px;
        border-radius: 10px;
        font-family: var(--fd);
        font-weight: 700;
        font-size: 0.78rem;
        cursor: pointer;
        transition: all 0.25s var(--ease);
        border: 1.5px solid;
        white-space: nowrap;
      }
      .outcome-switcher__btn--handled {
        background: rgba(139,92,246,0.06);
        border-color: rgba(139,92,246,0.25);
        color: #8B5CF6;
      }
      .outcome-switcher__btn--handled:hover {
        background: rgba(139,92,246,0.12);
        transform: translateY(-2px);
        box-shadow: 0 4px 16px rgba(139,92,246,0.15);
      }
      .outcome-switcher__btn--ignored {
        background: #fff;
        border-color: var(--ls-border);
        color: var(--td3);
      }
      .outcome-switcher__btn--ignored:hover {
        background: #FEF2F2;
        border-color: #FCA5A5;
        color: #EF4444;
      }
      .outcome-switcher__result {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .outcome-switcher__pipeline {
        height: 3px;
        background: var(--ls-border);
        border-radius: 2px;
        overflow: hidden;
      }
      .outcome-switcher__pipeline-fill {
        height: 100%;
        background: #8B5CF6;
        border-radius: 2px;
      }
      .outcome-switcher__outcome-cards {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .outcome-switcher__step-card {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 8px 12px;
        background: #FAFBFE;
        border: 1px solid var(--ls-border);
        border-radius: 8px;
        font-family: var(--fd);
        font-weight: 600;
        font-size: 0.75rem;
        color: var(--td2);
      }
      .outcome-switcher__verdict {
        font-family: var(--fd);
        font-weight: 800;
        font-size: 0.85rem;
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 10px 14px;
        border-radius: 8px;
      }
      .outcome-switcher__verdict--won {
        background: rgba(20,184,166,0.08);
        color: #14B8A6;
        border: 1px solid rgba(20,184,166,0.2);
      }
      .outcome-switcher__verdict--lost {
        background: rgba(239,68,68,0.06);
        color: #EF4444;
        border: 1px solid rgba(239,68,68,0.2);
      }
      .outcome-switcher__fade-lead {
        font-family: var(--fd);
        font-weight: 600;
        font-size: 0.85rem;
        color: var(--td3);
        text-align: center;
        padding: 10px;
      }
      .outcome-switcher__reset {
        background: transparent;
        border: 1px solid var(--ls-border);
        border-radius: 6px;
        padding: 6px 14px;
        font-family: var(--fd);
        font-weight: 600;
        font-size: 0.7rem;
        color: var(--td3);
        cursor: pointer;
        margin-top: 4px;
        align-self: center;
        transition: all 0.2s;
      }
      .outcome-switcher__reset:hover {
        border-color: var(--blue-border);
        color: var(--blue);
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         PlatformDepthReveal — WOW 7
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      .depth-reveal {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 32px;
      }
      .depth-reveal__center {
        display: flex;
        justify-content: center;
      }
      .depth-reveal__brain {
        width: 80px;
        height: 80px;
        border-radius: 20px;
        background: linear-gradient(135deg, #1B4FFF, #4F7CFF);
        display: flex;
        align-items: center;
        justify-content: center;
        transition: box-shadow 0.5s;
      }
      .depth-reveal__brain-label {
        font-family: var(--fd);
        font-weight: 900;
        font-size: 0.55rem;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: #fff;
      }
      .depth-reveal__tiles {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 12px;
        width: 100%;
      }
      .depth-reveal__tile-wrap {
        display: flex;
        flex-direction: column;
      }
      .depth-reveal__tile {
        display: flex;
        align-items: center;
        gap: 10px;
        width: 100%;
        text-align: left;
        font-family: var(--fd);
        border: none;
      }
      .depth-reveal__tile-icon {
        width: 42px;
        height: 42px;
        border-radius: 11px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .depth-reveal__tile-label {
        font-weight: 800;
        font-size: 0.88rem;
        color: var(--td1);
        letter-spacing: -0.02em;
      }
      .depth-reveal__capabilities {
        overflow: hidden;
      }
      .depth-reveal__cap-inner {
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding: 12px 0 4px;
      }
      .depth-reveal__cap-chip {
        display: flex;
        align-items: flex-start;
        gap: 10px;
        padding: 10px 14px;
        background: #FAFBFE;
        border: 1px solid;
        border-radius: 10px;
      }
      .depth-reveal__cap-dot {
        width: 5px;
        height: 5px;
        border-radius: 50%;
        flex-shrink: 0;
        margin-top: 5px;
      }
      .depth-reveal__cap-name {
        font-family: var(--fd);
        font-weight: 700;
        font-size: 0.78rem;
        color: var(--td1);
        margin-bottom: 2px;
      }
      .depth-reveal__cap-desc {
        font-size: 0.7rem;
        color: var(--td3);
        line-height: 1.4;
      }
      @media (max-width: 768px) {
        .depth-reveal__tiles { grid-template-columns: 1fr; }
        .outcome-switcher__choices { flex-direction: column; }
      }
    </style>
  </head>
  <body>
