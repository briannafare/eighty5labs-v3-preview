<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>eighty5labs | AI Operating System for Local Business</title>
    <meta name="description" content="AI agents that close the visibility, reputation, and conversion gaps for local service businesses. Get found in AI search. Dominate Google Maps. Never miss a call." />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Epilogue:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600;1,700;1,900&display=swap" rel="stylesheet">
    <style>
      :root {
        /* ── Dark section palette (hero, dark bands) */
        --bg0: #080C17;
        --bg1: #0F1623;
        --bg2: #161E2E;
        --bg3: #1C2540;
        --surface: rgba(255,255,255,0.05);
        --surface-hover: rgba(255,255,255,0.09);

        /* ── Light section palette (alternating bands) */
        --ls0: #FFFFFF;          /* pure white sections */
        --ls1: #FAF9F7;          /* warm off-white — subtle cream tint */
        --ls2: #F5F3EF;          /* warmer alt for deeper contrast */
        --ls-border: #E8E4DD;    /* warm neutral border */
        --ls-surface: rgba(27,79,255,0.05);
        --ls-card: #FFFFFF;

        /* ── Light section text */
        --td1: #0F172A;          /* primary text on light */
        --td2: #334155;          /* secondary text on light */
        --td3: #64748B;          /* muted text on light */

        /* ── Brand */
        --blue: #1B4FFF;
        --blue2: #2B5FFF;
        --blue3: #4F8EF7;
        --blue-lt: rgba(27,79,255,0.10);
        --blue-border: rgba(27,79,255,0.25);

        /* ── Gap / accent colors */
        --gap1: #10B981;
        --gap1-lt: rgba(16,185,129,0.10);
        --gap1-lt-d: rgba(16,185,129,0.15);
        --gap1-border: rgba(16,185,129,0.25);
        --gap2: #4F8EF7;
        --gap2-lt: rgba(79,142,247,0.10);
        --gap2-lt-d: rgba(79,142,247,0.15);
        --gap2-border: rgba(79,142,247,0.22);
        --gap3: #8B5CF6;
        --gap3-lt: rgba(139,92,246,0.10);
        --gap3-lt-d: rgba(139,92,246,0.15);
        --gap3-border: rgba(139,92,246,0.22);

        /* ── Text (dark sections) */
        --t1: #FFFFFF;
        --t2: rgba(255,255,255,0.80);
        --t3: rgba(255,255,255,0.52);
        --t4: rgba(255,255,255,0.30);

        /* ── Borders (dark sections) */
        --border: rgba(255,255,255,0.08);
        --border-strong: rgba(255,255,255,0.15);

        /* ── Radius */
        --rd-nav: 6px;
        --rd: 10px;
        --rd-btn: 999px;
        --rdl: 14px;
        --rdxl: 20px;

        /* ── Fonts */
        --fd: 'Epilogue', sans-serif;
        --fb: 'Inter', sans-serif;
        --fs: 'Playfair Display', Georgia, serif;

        /* ── Layout */
        --max-w: 1140px;
        --nav-h: 64px;
      }

      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

      html { scroll-behavior: smooth; }

      body {
        background: var(--ls0);
        color: var(--td1);
        font-family: var(--fb);
        font-size: 16px;
        line-height: 1.6;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }

      /* Grid noise overlay — hero only via mask */
      #grid-overlay {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 0;
        background-image:
          linear-gradient(to right, rgba(255,255,255,0.022) 1px, transparent 1px),
          linear-gradient(to bottom, rgba(255,255,255,0.022) 1px, transparent 1px);
        background-size: 72px 72px;
        mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 80%);
        -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 0%, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0) 80%);
      }

      #root { position: relative; z-index: 1; min-height: 100vh; }

      /* ── Container */
      .wrap {
        max-width: var(--max-w);
        margin-inline: auto;
        padding-inline: clamp(20px, 5vw, 48px);
        width: 100%;
      }

      /* ── Typography */
      h1, h2, h3, h4, h5 { font-family: var(--fd); letter-spacing: -0.03em; line-height: 1.08; }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         BUTTON SYSTEM — intentional hierarchy
         
         Two families:
         1. .btn-nav-*   → nav CTA (sharp: 6px radius, compact)
         2. .btn         → body CTAs (pill: 999px radius, generous padding)
         
         Within .btn: primary (solid blue) and ghost (outline)
         Ghost adapts to context: dark bg vs light bg via modifier
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */

      /* Nav CTA — pill shape matching reference */
      .btn-nav {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        padding: 9px 20px;
        border-radius: 999px;
        font-family: var(--fb);
        font-size: 0.875rem;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: all 0.3s ease;
        text-decoration: none;
        white-space: nowrap;
      }
      .btn-nav-primary {
        background: var(--td1);
        color: #fff;
      }
      .btn-nav-primary:hover {
        background: var(--blue);
        box-shadow: 0 8px 24px rgba(27,79,255,0.25);
      }
      .btn-nav-ghost {
        background: transparent;
        color: var(--td2);
        border: none;
        padding: 9px 8px;
      }
      .btn-nav-ghost:hover {
        color: var(--blue);
      }

      /* Body CTAs — pill shape, generous, reference-matched */
      .btn {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        padding: 15px 30px;
        border-radius: 999px;
        font-family: var(--fb);
        font-size: 0.9375rem;
        font-weight: 600;
        cursor: pointer;
        border: none;
        transition: all 0.3s ease;
        text-decoration: none;
        white-space: nowrap;
      }
      /* Primary — dark fill on light bg, blue on dark bg */
      .btn-primary {
        background: var(--td1);
        color: #fff;
        position: relative;
        overflow: hidden;
      }
      .btn-primary::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, var(--blue) 0%, #0A3DE6 100%);
        opacity: 0;
        transition: opacity 0.3s;
      }
      .btn-primary:hover::after { opacity: 1; }
      .btn-primary > * { position: relative; z-index: 1; }
      .btn-primary:hover {
        background: var(--blue);
        transform: translateY(-2px) scale(1.02);
        box-shadow: 0 12px 32px rgba(27,79,255,0.30), 0 4px 12px rgba(27,79,255,0.15);
      }
      /* Ghost on dark bg */
      .btn-ghost {
        background: rgba(255,255,255,0.06);
        color: var(--t1);
        border: 1.5px solid rgba(255,255,255,0.16);
      }
      .btn-ghost:hover {
        background: rgba(255,255,255,0.12);
        border-color: rgba(255,255,255,0.30);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(0,0,0,0.2);
      }
      /* Ghost on light bg — white fill with border */
      .btn-ghost-light {
        background: #FFFFFF;
        color: var(--td1);
        border: 1.5px solid var(--ls-border);
      }
      .btn-ghost-light:hover {
        border-color: var(--blue-border);
        background: rgba(27,79,255,0.03);
        color: var(--blue);
        transform: translateY(-2px);
        box-shadow: 0 8px 24px rgba(27,79,255,0.08);
      }
      /* Smaller body button variant */
      .btn-sm {
        padding: 10px 20px;
        font-size: 0.875rem;
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         SECTION SYSTEM
         Dark (.section-dark) and light (.section, .section-light)
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      .section {
        padding-block: clamp(80px, 9vw, 136px);
        position: relative;
      }
      .section-dark {
        padding-block: clamp(80px, 9vw, 136px);
        position: relative;
        background: var(--bg0);
        color: var(--t1);
      }
      .section-light {
        padding-block: clamp(80px, 9vw, 136px);
        position: relative;
        background: var(--ls1);
      }
      .section-white {
        padding-block: clamp(80px, 9vw, 136px);
        position: relative;
        background: var(--ls0);
      }

      /* Section labels — adapt to bg */
      .section-label {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        font-size: 0.6875rem;
        font-weight: 700;
        letter-spacing: 0.13em;
        text-transform: uppercase;
        margin-bottom: 16px;
      }
      .section-label::before {
        content: '';
        display: block;
        width: 18px;
        height: 1px;
      }
      /* label on dark bg */
      .section-dark .section-label,
      .dark-section .section-label { color: var(--t4); }
      .section-dark .section-label::before,
      .dark-section .section-label::before { background: var(--t4); }
      /* label on light bg (default) */
      .section-label { color: var(--td3); }
      .section-label::before { background: var(--td3); }

      /* Section headings — scaled up for impact */
      .section-heading {
        font-size: clamp(2.2rem, 5vw, 3.5rem);
        font-weight: 900;
        margin-bottom: 18px;
        max-width: 20ch;
        line-height: 1.06;
        letter-spacing: -0.04em;
      }
      .section-heading-dark { color: var(--t1); }
      .section-heading-light { color: var(--td1); }
      /* Default (light bg) */
      .section-heading { color: var(--td1); }
      /* Override for dark sections */
      .section-dark .section-heading { color: var(--t1); }

      /* Serif italic accent for mixed headlines */
      .heading-accent {
        font-family: var(--fs);
        font-style: italic;
        font-weight: 400;
      }

      .section-sub {
        font-size: 1.0625rem;
        line-height: 1.75;
        max-width: 54ch;
      }
      .section-sub-dark { color: var(--t3); }
      /* Default (light bg) */
      .section-sub { color: var(--td2); }
      /* Override for dark sections */
      .section-dark .section-sub { color: var(--t3); }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         CARDS
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      /* Card on dark bg */
      .card {
        background: var(--bg1);
        border: 1.5px solid var(--border);
        border-radius: var(--rdl);
        padding: 28px;
        transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s, background 0.3s;
      }
      .card:hover {
        border-color: rgba(79,142,247,0.30);
        background: var(--bg2);
        box-shadow: 0 8px 40px rgba(0,0,0,0.35), 0 0 0 1px rgba(79,142,247,0.08);
        transform: translateY(-3px) scale(1.008);
      }
      /* Card on light bg */
      .card-light {
        background: var(--ls-card);
        border: 1.5px solid var(--ls-border);
        border-radius: var(--rdl);
        padding: 28px;
        box-shadow: 0 2px 12px rgba(15,23,42,0.06);
        transition: border-color 0.3s, box-shadow 0.3s, transform 0.3s, background 0.3s;
      }
      .card-light:hover {
        border-color: rgba(27,79,255,0.22);
        background: #FBFCFF;
        box-shadow: 0 8px 32px rgba(27,79,255,0.10), 0 2px 8px rgba(15,23,42,0.06);
        transform: translateY(-3px) scale(1.008);
      }

      /* ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
         UTILITIES
         ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
      hr { border: none; border-top: 1px solid var(--border); }
      hr.hr-light { border-top-color: var(--ls-border); }

      .text-blue { color: var(--blue3); }
      .text-blue-dark { color: var(--blue2); }
      .text-green { color: var(--gap1); }
      .text-purple { color: var(--gap3); }
      .text-muted { color: var(--t3); }
      .text-muted-light { color: var(--td3); }
      .text-center { text-align: center; }

      /* Scrollbar */
      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: var(--ls1); }
      ::-webkit-scrollbar-thumb { background: #D4D0C9; border-radius: 3px; }

      /* Focus */
      :focus-visible { outline: 2px solid var(--blue); outline-offset: 3px; }

      /* Hero grid pattern overlay */
      .hero-pattern {
        position: relative;
      }
      .hero-pattern::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(rgba(15,23,42,0.04) 1px, transparent 1px),
          linear-gradient(90deg, rgba(15,23,42,0.04) 1px, transparent 1px);
        background-size: 52px 52px;
        mask-image: radial-gradient(ellipse 90% 85% at 68% 35%, black 0%, transparent 70%);
        -webkit-mask-image: radial-gradient(ellipse 90% 85% at 68% 35%, black 0%, transparent 70%);
        pointer-events: none;
        z-index: 0;
      }
      .hero-pattern > * { position: relative; z-index: 1; }

      /* Dark section variant: bg1 instead of bg0 */
      .section-dark-alt {
        padding-block: clamp(80px, 9vw, 136px);
        position: relative;
        background: var(--bg1);
        color: var(--t1);
      }
      .section-dark-alt .section-label { color: var(--t4); }
      .section-dark-alt .section-label::before { background: var(--t4); }
      .section-dark-alt .section-heading { color: var(--t1); }
      .section-dark-alt .section-sub { color: var(--t3); }

      /* Light section top border (matches V2) */
      .section-light { border-top: 1px solid var(--ls-border); }
      .section-white { border-top: 1px solid var(--ls-border); }
      .section-white + .section-white { border-top: none; }

      /* Mobile */
      @media (max-width: 768px) {
        .hide-mobile { display: none !important; }
        .hero-grid { grid-template-columns: 1fr !important; }
        .gaps-calc-grid { grid-template-columns: 1fr !important; }
        .pricing-grid { grid-template-columns: 1fr !important; }
        .addons-grid { grid-template-columns: 1fr !important; }
        .stats-grid { grid-template-columns: repeat(2, 1fr) !important; }
        .ind-grid { grid-template-columns: repeat(2, 1fr) !important; }
        .ind-grid > :last-child { grid-column: span 2; }
        .ind-panel-grid { grid-template-columns: 1fr !important; }
        .footer-grid { grid-template-columns: 1fr 1fr !important; gap: 32px !important; }
      }
      @media (min-width: 769px) {
        .hide-desktop { display: none !important; }
      }

      /* Range slider thumb styling */
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        appearance: none;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #fff;
        border: 2px solid rgba(255,255,255,0.3);
        cursor: pointer;
        box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      }
      input[type="range"]::-moz-range-thumb {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: #fff;
        border: 2px solid rgba(255,255,255,0.3);
        cursor: pointer;
        box-shadow: 0 2px 6px rgba(0,0,0,0.3);
      }
    </style>
  </head>
  <body>
    <div id="grid-overlay" aria-hidden="true"></div>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
